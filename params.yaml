data:
  train_path: Fruits_Vegetables/train
  test_path: Fruits_Vegetables/test
  val_path: Fruits_Vegetables/validation
  img_width: 180
  img_height: 180
  batch_size: 32

model:
  conv_filters: [16, 32, 64]
  conv_kernel: 3
  dropout_rate: 0.2
  dense_units: 128

train:
  epochs: 25
  optimizer: adam
  learning_rate: 0.001